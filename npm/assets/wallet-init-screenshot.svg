<svg xmlns="http://www.w3.org/2000/svg" width="820" height="680" viewBox="0 0 820 680">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#0f1018"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Window frame -->
  <rect x="20" y="20" width="780" height="640" rx="12" fill="url(#bg)" filter="url(#shadow)" stroke="#2a2b3d" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="20" y="20" width="780" height="36" rx="12" fill="#1e1f32"/>
  <rect x="20" y="44" width="780" height="12" fill="#1e1f32"/>

  <!-- Window buttons -->
  <circle cx="44" cy="38" r="6" fill="#ff5f57"/>
  <circle cx="64" cy="38" r="6" fill="#febc2e"/>
  <circle cx="84" cy="38" r="6" fill="#28c840"/>

  <!-- Title text -->
  <text x="410" y="43" font-family="Inter, SF Pro, -apple-system, sans-serif" font-size="12" fill="#8888aa" text-anchor="middle">Terminal</text>

  <!-- Terminal content -->
  <g font-family="JetBrains Mono, SF Mono, Menlo, monospace" font-size="12.5">

    <!-- Prompt line -->
    <text x="40" y="82" fill="#56D4C8">$</text>
    <text x="56" y="82" fill="#e0e0e8">zipher wallet init</text>

    <!-- OWS vault creation -->
    <text x="40" y="112" fill="#8888aa">Created OWS vault wallet 'zipher-mainnet' (id: 7f3a...c8e1)</text>

    <!-- Output header -->
    <text x="40" y="148" fill="#e0e0e8" font-weight="bold">Wallet initialized.</text>

    <!-- Seed phrase -->
    <text x="40" y="180" fill="#E8C48D">  SEED PHRASE (back this up -- shown only once):</text>
    <text x="40" y="198" fill="#e0e0e8">  voyage debris clinic mother squeeze drama chronic</text>
    <text x="40" y="216" fill="#e0e0e8">  peanut notable rally cotton garlic penalty harvest</text>
    <text x="40" y="234" fill="#e0e0e8">  orbit similar impulse notable fossil brick meadow</text>
    <text x="40" y="252" fill="#e0e0e8">  anchor combine fiber ********</text>

    <!-- Address -->
    <text x="40" y="284" fill="#8888aa">  Address:</text>
    <text x="140" y="284" fill="#e0e0e8">u1qr7v...k4xf (unified)</text>

    <!-- Birthday -->
    <text x="40" y="304" fill="#8888aa">  Birthday:</text>
    <text x="140" y="304" fill="#e0e0e8">2984217</text>

    <!-- Data dir -->
    <text x="40" y="324" fill="#8888aa">  Data dir:</text>
    <text x="140" y="324" fill="#e0e0e8">~/.zipher/mainnet</text>

    <!-- OWS wallet -->
    <text x="40" y="344" fill="#8888aa">  OWS wallet:</text>
    <text x="150" y="344" fill="#e0e0e8">zipher-mainnet (encrypted at ~/.ows/wallets/)</text>

    <!-- Policy header -->
    <text x="40" y="380" fill="#e0e0e8">  Default policy:</text>

    <!-- Policy details -->
    <text x="40" y="400" fill="#8888aa">    max_per_tx:</text>
    <text x="180" y="400" fill="#e0e0e8">1000000 ZAT (0.0100 ZEC)</text>

    <text x="40" y="420" fill="#8888aa">    daily_limit:</text>
    <text x="180" y="420" fill="#e0e0e8">10000000 ZAT (0.1000 ZEC)</text>

    <text x="40" y="440" fill="#8888aa">    approval_threshold:</text>
    <text x="210" y="440" fill="#e0e0e8">5000000 ZAT (0.0500 ZEC)</text>

    <text x="40" y="460" fill="#8888aa">    Edit: ~/.zipher/mainnet/policy.toml</text>

    <!-- MCP config -->
    <text x="40" y="496" fill="#e0e0e8">  MCP config (add to Claude/Cursor settings):</text>
    <text x="40" y="516" fill="#56D4C8">  {</text>
    <text x="40" y="534" fill="#56D4C8">    "mcpServers": {</text>
    <text x="40" y="552" fill="#56D4C8">      "zipher": {</text>
    <text x="40" y="570" fill="#56D4C8">        "command": "<tspan fill="#e0e0e8">zipher-mcp-server</tspan>"</text>
    <text x="40" y="588" fill="#56D4C8">      }</text>
    <text x="40" y="606" fill="#56D4C8">    }</text>
    <text x="40" y="624" fill="#56D4C8">  }</text>

    <!-- Final line -->
    <text x="40" y="650" fill="#e0e0e8">  Fund the wallet, then your AI agent can spend shielded ZEC.</text>

  </g>
</svg>
