name: Testnet Integration Tests

on:
  push:
    branches: [main, dev]
    paths:
      - "rust/**"
  pull_request:
    paths:
      - "rust/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  ZIPHER_DATA_DIR: /tmp/zipher-testnet
  ZIPHER_CHAIN: testnet

jobs:
  test:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: testnet-ci-${{ hashFiles('rust/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev cmake

      - name: Run unit tests
        run: cargo test --workspace --exclude rust_lib_zipher

      - name: Build CLI (release)
        run: cargo build --release -p zipher-cli

      - name: Smoke test - CLI help
        run: ./target/release/zipher-cli --help

      - name: Smoke test - version
        run: ./target/release/zipher-cli --version || true

      - name: Build MCP server
        run: cargo build --release -p zipher-mcp-server

      - name: Clippy
        run: cargo clippy -p zipher-cli -p zipher-mcp-server -p zipher-engine -- -D warnings || true
