name: Build and Release Android/FDroid

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  JKS_PASSWORD: ${{ secrets.JKS_PASSWD }}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: env
        run: cat build.env >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install Flutter
        run: |
          git clone --branch $FLUTTER_VERSION --depth 1 https://github.com/flutter/flutter.git $HOME/flutter
          echo "$HOME/flutter/bin" >> $GITHUB_PATH

      - name: Build
        id: build
        run: |
          flutter precache --android
          flutter pub get
          dart run build_runner build -d
          flutter build apk --release
          flutter build appbundle --release
          BUILD_DIR=build/app/outputs/flutter-apk
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_OUTPUT

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.build.outputs.BUILD_DIR }}/app-release.apk" \
            "build/app/outputs/bundle/release/app-release.aab" \
            --clobber

      - name: publish
        uses: r0adkll/upload-google-play@v1
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        with:
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: dev.atmospherelabs.zipher
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed

      - uses: actions/upload-artifact@v4
        with:
          name: APK
          path: ${{ steps.build.outputs.BUILD_DIR }}/app-release.apk
          retention-days: 3
