name: Release CLI Binaries

on:
  push:
    tags:
      - "cli-v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: zipher-cli-darwin-arm64
          - os: macos-26-intel
            target: x86_64-apple-darwin
            artifact: zipher-cli-darwin-x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: zipher-cli-linux-x64
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: zipher-cli-linux-arm64

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: rust

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('rust/Cargo.lock') }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p zipher-cli -p zipher-mcp-server
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binaries
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/zipher-cli dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}
          if [ -f target/${{ matrix.target }}/release/zipher-mcp-server ]; then
            MCP_NAME=$(echo "${{ matrix.artifact }}" | sed 's/zipher-cli/zipher-mcp-server/')
            cp target/${{ matrix.target }}/release/zipher-mcp-server dist/${MCP_NAME}
            chmod +x dist/${MCP_NAME}
            (cd dist && (sha256sum ${MCP_NAME} 2>/dev/null || shasum -a 256 ${MCP_NAME}) > ${MCP_NAME}.sha256)
          fi
          (cd dist && (sha256sum ${{ matrix.artifact }} 2>/dev/null || shasum -a 256 ${{ matrix.artifact }}) > ${{ matrix.artifact }}.sha256)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: rust/dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cli-v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${GITHUB_REF}" == *"-rc"* || "${GITHUB_REF}" == *"-beta"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${GITHUB_REF_NAME}" dist/* \
            --generate-notes \
            --verify-tag \
            ${PRERELEASE_FLAG}
